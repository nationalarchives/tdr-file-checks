name: TDR Tag and pre deploy
on:
  push:
    branches:
      - main

permissions: {}

jobs:
  extract-config:
    runs-on: ubuntu-latest
    outputs:
      droid-version: ${{ env.DROID_VERSION }}
      droid-download-name: ${{ env.DROID_DOWNLOAD_NAME }}
      containers-version: ${{ env.CONTAINERS_VERSION }}
      containers-download-name: ${{ env.CONTAINERS_DOWNLOAD_NAME }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Extract configuration values
        run: |
          DROID_VERSION=$(grep 'droid.version' src/main/resources/application.conf | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          DROID_DOWNLOAD_NAME=$(grep 'droid.signature.name' src/main/resources/application.conf | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          CONTAINERS_VERSION=$(grep 'containers.version' src/main/resources/application.conf | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          CONTAINERS_DOWNLOAD_NAME=$(grep 'containers.signature.name' src/main/resources/application.conf | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          
          echo "DROID_VERSION=$DROID_VERSION" >> $GITHUB_ENV
          echo "DROID_DOWNLOAD_NAME=$DROID_DOWNLOAD_NAME" >> $GITHUB_ENV
          echo "CONTAINERS_VERSION=$CONTAINERS_VERSION" >> $GITHUB_ENV
          echo "CONTAINERS_DOWNLOAD_NAME=$CONTAINERS_DOWNLOAD_NAME" >> $GITHUB_ENV
  pre-deploy:
    needs: extract-config
    uses: nationalarchives/tdr-github-actions/.github/workflows/lambda_build.yml@b6ba669dcee7fd4ac089c2e9fb234c48ddd93ab5 # v0.0.15
    with:
      lambda-name: file-checks
      repo-name: tdr-file-checks
      artifact-name: file-checks
      java-version: '21'
      build-command: |
        curl -L "https://cdn.nationalarchives.gov.uk/documents/${{ needs.extract-config.outputs.droid-download-name }}${{ needs.extract-config.outputs.droid-version }}.xml" -o "src/main/resources/${{ needs.extract-config.outputs.droid-download-name }}${{ needs.extract-config.outputs.droid-version }}.xml"
        curl -L "https://cdn.nationalarchives.gov.uk/documents/${{ needs.extract-config.outputs.containers-download-name }}${{ needs.extract-config.outputs.containers-version }}.xml" -o "src/main/resources/${{ needs.extract-config.outputs.containers-download-name }}${{ needs.extract-config.outputs.containers-version }}.xml"
        sbt assembly
    secrets:
      MANAGEMENT_ACCOUNT: ${{ secrets.MANAGEMENT_ACCOUNT }}
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
  deploy:
    needs: pre-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: gh workflow run deploy.yml -f environment=intg -f to-deploy=${{ needs.pre-deploy.outputs.next-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_PAT }}
